services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: paper_reader
      POSTGRES_USER: paper_reader
      POSTGRES_PASSWORD: paper_reader
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: [CMD-SHELL, pg_isready -U paper_reader -d paper_reader]
      interval: 5s
      timeout: 3s
      retries: 20
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 20
  api: &backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: .env
        required: false
    environment: &environment
      DATABASE_URL: postgresql+psycopg://paper_reader:paper_reader@postgres:5432/paper_reader
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PROJECT_ROOT: /app
    ports: ["8000:8000"]
    volumes: [runtime_data:/app/backend/outputs]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test: [CMD, python, -c, "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
  worker:
    <<: *backend
    command: celery -A backend.worker.celery_app:celery_app worker --loglevel=INFO
    ports: []
    environment: *environment
    healthcheck:
      disable: true
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports: ["3000:80"]
    depends_on:
      api: {condition: service_healthy}
    healthcheck:
      test: [CMD, wget, -q, --spider, http://127.0.0.1/]
      interval: 10s
      timeout: 3s
      retries: 5
volumes:
  postgres_data:
  redis_data:
  runtime_data:
